<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Daily - 历史归档</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="logo">AI News <span>Daily</span></div>
            <div class="header-meta">历史归档</div>
            <nav class="nav-links">
                <a href="index.html">🏠 首页</a>
                <a href="#" onclick="location.reload(); return false;">🔄 刷新</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="date-header">
            <div class="date">历史归档</div>
            <div class="subtitle"><span class="emoji">📚</span> 浏览过去的 AI 每日速递</div>
        </div>

        <div id="archive-list">
                    <div class="archive-item" data-date="20260303" onclick="loadArchiveDate('20260303')" style="cursor: pointer;">
            <div class="archive-date">
                <span class="date-text">2026年3月3日</span>
                <span class="weekday-text">周二</span>
            </div>
            <div class="archive-info">
                <div class="archive-count">15条新闻</div>
                <div class="archive-top">🔥 Meta’s AI smart glasses and data privacy concerns</div>
                <div class="archive-cats"><span class="source-badge">全球头条 4</span> <span class="source-badge">其他 6</span> <span class="source-badge">科技与开发 4</span> <span class="source-badge">产品猎场 1</span> </div>
            </div>
        </div>
        </div>

        <!-- News Display Section (hidden by default) -->
        <div id="news-display" style="display: none;">
            <div class="archive-back-header">
                <button onclick="closeArchiveNews()" class="back-btn">← 返回归档列表</button>
                <div class="archive-date-title" id="display-date-title"></div>
            </div>
            <div id="news-content"></div>
        </div>

        <div class="empty-state" style="display: none;">
            <p>📭 暂无历史记录</p>
        </div>
    </main>

    <footer>
        <p>由 <a href="https://github.com">AI News Daily</a> 自动生成</p>
        <p style="margin-top: 0.5rem; color: var(--text-meta);">每日更新·AI新鲜事</p>
    </footer>

    <script src="assets/js/main.js"></script>
</body>
</html>
